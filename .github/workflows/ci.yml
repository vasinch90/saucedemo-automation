name: Selenium Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run tests (headless)
        run: |
          sed -i 's/# options.add_argument("--headless")/options.add_argument("--headless")/' conftest.py
          sed -i 's/# options.add_argument("--no-sandbox")/options.add_argument("--no-sandbox")/' conftest.py
          sed -i 's/# options.add_argument("--disable-dev-shm-usage")/options.add_argument("--disable-dev-shm-usage")/' conftest.py
          pytest tests/ -v --html=report.html --self-contained-html

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: report.html
